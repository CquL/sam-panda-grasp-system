name: Validate Repository

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:

jobs:
  validate:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.9"

      - name: Validate shell syntax
        run: |
          bash -n scripts/check_export_env.sh
          bash -n scripts/download_models.sh
          bash -n scripts/source_project_env.sh

      - name: Validate Python syntax
        run: |
          python -m py_compile \
            src/sam_perception/scripts/check_cam.py \
            src/sam_perception/scripts/check_models.py \
            src/sam_perception/scripts/experiment_logger.py \
            src/sam_perception/scripts/global_vlm_target_node.py \
            src/sam_perception/scripts/grasp_from_sam.py \
            src/sam_perception/scripts/llm_planner.py \
            src/sam_perception/scripts/pointcloud_debugger.py \
            src/sam_perception/scripts/ros_image_compat.py \
            src/sam_perception/scripts/sam_node.py \
            src/sam_perception/scripts/semantic_reranker.py \
            src/sam_perception/scripts/task_command_cli.py \
            src/sam_perception/scripts/wrist_vlm_node.py \
            src/sam_perception/src/sam_perception/core_grasp.py \
            src/sam_perception/src/sam_perception/core_llm.py \
            src/sam_perception/src/sam_perception/core_sam.py \
            src/panda_pick_place/scripts/control_panel.py \
            src/panda_pick_place/scripts/demo.py \
            src/panda_pick_place/scripts/gazebo_interface.py \
            src/panda_pick_place/scripts/grasp_test.py \
            src/panda_pick_place/scripts/gtsp_scheduler.py \
            src/panda_pick_place/scripts/motion_controller.py \
            src/panda_pick_place/scripts/moveit_learn.py \
            src/panda_pick_place/scripts/new.py


      - name: Check for machine-local absolute paths under src
        run: |
          if grep -R -nE '/home/[^/]+/' \
            src/sam_perception \
            src/panda_moveit_config \
            src/panda_pick_place; then
            echo 'Unexpected machine-local path found under src/'
            exit 1
          fi

      - name: Check for committed API keys
        run: |
          if grep -R -nE \
            --exclude-dir=.git \
            --exclude='*.svg' \
            --exclude='*.png' \
            --exclude='*.jpg' \
            --exclude='*.jpeg' \
            'sk-[A-Za-z0-9_-]{16,}' .; then
            echo 'Potential API key committed to repository'
            exit 1
          fi
