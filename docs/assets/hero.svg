<svg width="1280" height="420" viewBox="0 0 1280 420" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1280" y2="420" gradientUnits="userSpaceOnUse">
      <stop stop-color="#0F172A"/>
      <stop offset="0.5" stop-color="#102A43"/>
      <stop offset="1" stop-color="#0B3B2E"/>
    </linearGradient>
    <linearGradient id="card" x1="0" y1="0" x2="1" y2="1">
      <stop stop-color="#FFFFFF" stop-opacity="0.16"/>
      <stop offset="1" stop-color="#FFFFFF" stop-opacity="0.04"/>
    </linearGradient>
  </defs>

  <rect width="1280" height="420" rx="28" fill="url(#bg)"/>
  <circle cx="1110" cy="86" r="132" fill="#38BDF8" fill-opacity="0.10"/>
  <circle cx="1060" cy="310" r="170" fill="#22C55E" fill-opacity="0.10"/>
  <circle cx="195" cy="84" r="145" fill="#F97316" fill-opacity="0.10"/>

  <text x="72" y="118" fill="white" font-family="Arial, sans-serif" font-size="54" font-weight="700">
    SAM Grasp System
  </text>
  <text x="72" y="164" fill="#C8D6E5" font-family="Arial, sans-serif" font-size="24">
    Vision-language grounding, SAM segmentation, 3D point clouds, GraspNet, and Panda execution
  </text>
  <text x="72" y="206" fill="#9FB3C8" font-family="Arial, sans-serif" font-size="19">
    A robotics grasping stack consolidated from multiple local ROS workspaces into one exportable repository
  </text>

  <rect x="72" y="258" width="238" height="92" rx="18" fill="url(#card)" stroke="#FFFFFF" stroke-opacity="0.18"/>
  <text x="94" y="294" fill="#E2E8F0" font-family="Arial, sans-serif" font-size="16">Perception</text>
  <text x="94" y="327" fill="white" font-family="Arial, sans-serif" font-size="28" font-weight="700">SAM + VLM + RGBD</text>

  <rect x="336" y="258" width="250" height="92" rx="18" fill="url(#card)" stroke="#FFFFFF" stroke-opacity="0.18"/>
  <text x="358" y="294" fill="#E2E8F0" font-family="Arial, sans-serif" font-size="16">Geometry</text>
  <text x="358" y="327" fill="white" font-family="Arial, sans-serif" font-size="28" font-weight="700">Masks to Point Clouds</text>

  <rect x="612" y="258" width="218" height="92" rx="18" fill="url(#card)" stroke="#FFFFFF" stroke-opacity="0.18"/>
  <text x="634" y="294" fill="#E2E8F0" font-family="Arial, sans-serif" font-size="16">Grasping</text>
  <text x="634" y="327" fill="white" font-family="Arial, sans-serif" font-size="28" font-weight="700">GraspNet</text>

  <rect x="856" y="258" width="330" height="92" rx="18" fill="url(#card)" stroke="#FFFFFF" stroke-opacity="0.18"/>
  <text x="878" y="294" fill="#E2E8F0" font-family="Arial, sans-serif" font-size="16">Execution</text>
  <text x="878" y="327" fill="white" font-family="Arial, sans-serif" font-size="28" font-weight="700">MoveIt + Panda + Gazebo</text>
</svg>
