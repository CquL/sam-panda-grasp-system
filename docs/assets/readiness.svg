  <rect x="240" y="267" width="260" height="24" rx="12" fill="#EF4444"/>
  <text x="1160" y="285" fill="#FCA5A5" font-family="Arial, sans-serif" font-size="18" text-anchor="end">Not Yet</text>
</svg>
