  </defs>

  <rect width="1280" height="420" rx="28" fill="url(#bg)"/>
  <text x="60" y="70" fill="#0F172A" font-family="Arial, sans-serif" font-size="34" font-weight="700">
    End-to-End Robotics Stack
  </text>
  <text x="60" y="106" fill="#475569" font-family="Arial, sans-serif" font-size="18">
