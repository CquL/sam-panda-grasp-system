  <text x="84" y="295" fill="#475569" font-family="Arial, sans-serif" font-size="18">BBox proposal</text>

  <rect x="350" y="150" width="250" height="190" rx="22" fill="white" stroke="#D7E3EE"/>
  <text x="374" y="185" fill="#D94841" font-family="Arial, sans-serif" font-size="15" font-weight="700">02 PERCEPTION</text>
  <text x="374" y="225" fill="#0F172A" font-family="Arial, sans-serif" font-size="28" font-weight="700">SAM + RGBD</text>
