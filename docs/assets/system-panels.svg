  <text x="664" y="225" fill="#0F172A" font-family="Arial, sans-serif" font-size="28" font-weight="700">GraspNet</text>
  <text x="664" y="266" fill="#475569" font-family="Arial, sans-serif" font-size="18">Candidate poses</text>
  <text x="664" y="295" fill="#475569" font-family="Arial, sans-serif" font-size="18">Width / score / depth</text>

  <rect x="930" y="150" width="290" height="190" rx="22" fill="white" stroke="#D7E3EE"/>
