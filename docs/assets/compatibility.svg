  <text x="680" y="206" fill="white" font-family="Arial, sans-serif" font-size="28" font-weight="700">Python 3.9.25</text>
  <text x="680" y="238" fill="#E2E8F0" font-family="Arial, sans-serif" font-size="18">Torch 2.8.0 + Open3D 0.19</text>
  <text x="680" y="266" fill="#94A3B8" font-family="Arial, sans-serif" font-size="16">SAM + GraspNet side</text>

